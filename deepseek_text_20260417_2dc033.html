<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Крестики-нолики: сложность + валюта</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: rgba(30,40,50,0.7);
            backdrop-filter: blur(4px);
            border-radius: 64px;
            padding: 24px 20px 28px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
        }
        .game-panel {
            background: #1e2a32;
            border-radius: 48px;
            padding: 24px;
            box-shadow: inset 0 2px 5px #0f1217, 0 10px 20px rgba(0,0,0,0.3);
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: #0f1a1f;
            padding: 12px 20px;
            border-radius: 60px;
        }
        .stat-card {
            background: #2a3a44;
            padding: 6px 18px;
            border-radius: 40px;
            text-align: center;
            color: #f2e8cf;
            font-weight: bold;
            box-shadow: 0 2px 6px black;
            min-width: 80px;
        }
        .stat-label {
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #9bb7c9;
        }
        .stat-value {
            font-size: 1.7rem;
            font-weight: 800;
            line-height: 1;
            color: #ffd966;
        }
        .balance {
            background: #2e4a33;
        }
        .balance .stat-value {
            color: #c5e99b;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #2c3e2f;
            border-radius: 32px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 0 2px #5b8c5a;
            cursor: pointer;
            width: 100%;
            height: auto;
            max-width: 400px;
            aspect-ratio: 1/1;
        }
        .message-area {
            text-align: center;
            margin: 20px 0 12px;
            font-size: 1.3rem;
            font-weight: bold;
            background: #00000066;
            border-radius: 60px;
            padding: 10px;
            color: #ffecb3;
        }
        .difficulty-panel {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 12px 0 16px;
        }
        .difficulty-btn {
            background: #2a3a44;
            border: none;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            color: #e0e0e0;
            cursor: pointer;
            box-shadow: 0 2px 4px black;
        }
        .difficulty-btn.active {
            background: #ffb347;
            color: #2d2418;
            box-shadow: 0 0 8px #ffb347;
        }
        .reset-btn {
            background: #ffb347;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 40px;
            color: #2d2418;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 0 #a05e15;
            transition: 0.1s linear;
        }
        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #a05e15;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 18px;
            color: #7d8e9e;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="stats-bar">
            <div class="stat-card"><div class="stat-label">Победы (X)</div><div class="stat-value" id="playerWins">0</div></div>
            <div class="stat-card"><div class="stat-label">Победы (O)</div><div class="stat-value" id="aiWins">0</div></div>
            <div class="stat-card"><div class="stat-label">Ничьи</div><div class="stat-value" id="draws">0</div></div>
            <div class="stat-card balance"><div class="stat-label">💰 Монеты</div><div class="stat-value" id="balance">100</div></div>
        </div>
        <canvas id="ticTacCanvas" width="400" height="400"></canvas>
        <div class="message-area" id="gameMessage">Твой ход (X)</div>
        <div class="difficulty-panel">
            <button class="difficulty-btn" data-diff="easy">🍃 Лёгкая</button>
            <button class="difficulty-btn active" data-diff="hard">🔥 Сложная</button>
        </div>
        <button class="reset-btn" id="resetGameBtn">🔄 Новая игра</button>
        <footer>сложный ИИ: победа→блок→центр • лёгкий: случайные ходы</footer>
    </div>
</div>
<script>
    (function(){
        const canvas = document.getElementById('ticTacCanvas');
        const ctx = canvas.getContext('2d');
        const playerWinsSpan = document.getElementById('playerWins');
        const aiWinsSpan = document.getElementById('aiWins');
        const drawsSpan = document.getElementById('draws');
        const balanceSpan = document.getElementById('balance');
        const messageDiv = document.getElementById('gameMessage');
        const diffButtons = document.querySelectorAll('.difficulty-btn');
        
        let board = ['','','','','','','','',''];
        let gameActive = true;
        let isPlayerTurn = true;
        let currentWinner = null;
        let winningLine = null;
        let playerScore = 0;
        let aiScore = 0;
        let drawScore = 0;
        let coins = 100;
        let difficulty = 'hard';
        
        const cellSize = 400 / 3;
        const offset = cellSize / 2;
        
        function updateUIStats() {
            playerWinsSpan.innerText = playerScore;
            aiWinsSpan.innerText = aiScore;
            drawsSpan.innerText = drawScore;
            balanceSpan.innerText = coins;
        }
        
        function applyRewardBasedOnResult(result) {
            if (result === 'player') {
                const base = 10;
                const bonus = Math.floor(Math.random() * 20) + 1;
                messageDiv.innerText = `🎉 Победа! +${base} +${bonus} монет! 🎉`;
                coins += base + bonus;
            } else if (result === 'ai') {
                const loss = 5;
                const newCoins = Math.max(0, coins - loss);
                const actualLoss = coins - newCoins;
                coins = newCoins;
                messageDiv.innerText = `💀 Поражение... -${actualLoss} монет. 💀`;
            } else if (result === 'draw') {
                messageDiv.innerText = `🤝 Ничья! 0 монет. 🤝`;
            }
            updateUIStats();
        }
        
        function checkWinnerOnBoard(boardState) {
            const winPatterns = [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];
            for (let pattern of winPatterns) {
                const [a,b,c] = pattern;
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    const winner = boardState[a] === 'X' ? 'player' : 'ai';
                    return { winner, line: pattern };
                }
            }
            if (boardState.every(cell => cell !== '')) {
                return { winner: 'draw', line: null };
            }
            return { winner: null, line: null };
        }
        
        function endGame(result, line) {
            if (!gameActive) return;
            gameActive = false;
            isPlayerTurn = false;
            currentWinner = result;
            winningLine = line;
            if (result === 'player') {
                playerScore++;
                applyRewardBasedOnResult('player');
            } else if (result === 'ai') {
                aiScore++;
                applyRewardBasedOnResult('ai');
            } else if (result === 'draw') {
                drawScore++;
                applyRewardBasedOnResult('draw');
            }
            updateUIStats();
            drawBoard();
        }
        
        function resetGame() {
            board = ['','','','','','','','',''];
            gameActive = true;
            isPlayerTurn = true;
            currentWinner = null;
            winningLine = null;
            messageDiv.innerText = 'Твой ход (X)';
            drawBoard();
        }
        
        function checkAndHandleGameOver() {
            const { winner, line } = checkWinnerOnBoard(board);
            if (winner) {
                endGame(winner, line);
                return winner;
            }
            return null;
        }
        
        function makeMove(index, symbol) {
            if (!gameActive) return false;
            if (board[index] !== '') return false;
            if (symbol === 'X' && !isPlayerTurn) return false;
            if (symbol === 'O' && isPlayerTurn) return false;
            
            board[index] = symbol;
            drawBoard();
            
            const ended = checkAndHandleGameOver();
            if (ended) return true;
            
            if (symbol === 'X') {
                isPlayerTurn = false;
                messageDiv.innerText = '🤖 Ход ИИ...';
                drawBoard();
                setTimeout(() => {
                    if (gameActive && !isPlayerTurn) aiMove();
                }, 100);
            } else if (symbol === 'O') {
                isPlayerTurn = true;
                messageDiv.innerText = 'Твой ход (X)';
                drawBoard();
            }
            return true;
        }
        
        function getAvailableMoves(boardState) {
            let moves = [];
            for (let i = 0; i < 9; i++) {
                if (boardState[i] === '') moves.push(i);
            }
            return moves;
        }
        
        function getWinningMove(boardState, symbol) {
            const winPatterns = [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];
            for (let pattern of winPatterns) {
                const [a,b,c] = pattern;
                const vals = [boardState[a], boardState[b], boardState[c]];
                const emptyCount = vals.filter(v => v === '').length;
                const symbolCount = vals.filter(v => v === symbol).length;
                if (emptyCount === 1 && symbolCount === 2) {
                    if (boardState[a] === '') return a;
                    if (boardState[b] === '') return b;
                    if (boardState[c] === '') return c;
                }
            }
            return null;
        }
        
        function smartAIMove() {
            const available = getAvailableMoves(board);
            if (available.length === 0) return;
            let move = getWinningMove(board, 'O');
            if (move !== null) {
                makeMove(move, 'O');
                return;
            }
            move = getWinningMove(board, 'X');
            if (move !== null) {
                makeMove(move, 'O');
                return;
            }
            if (board[4] === '') {
                makeMove(4, 'O');
                return;
            }
            const corners = [0,2,6,8].filter(i => board[i] === '');
            if (corners.length) {
                const randomCorner = corners[Math.floor(Math.random() * corners.length)];
                makeMove(randomCorner, 'O');
                return;
            }
            const randomIndex = available[Math.floor(Math.random() * available.length)];
            makeMove(randomIndex, 'O');
        }
        
        function easyAIMove() {
            const available = getAvailableMoves(board);
            if (available.length) {
                const randomIndex = available[Math.floor(Math.random() * available.length)];
                makeMove(randomIndex, 'O');
            }
        }
        
        function aiMove() {
            if (!gameActive || isPlayerTurn) return;
            if (difficulty === 'hard') {
                smartAIMove();
            } else {
                easyAIMove();
            }
        }
        
        function drawBoard() {
            ctx.clearRect(0, 0, 400, 400);
            ctx.fillStyle = '#2c3e2f';
            ctx.fillRect(0, 0, 400, 400);
            ctx.beginPath();
            ctx.strokeStyle = '#e6d5a8';
            ctx.lineWidth = 4;
            for (let i = 1; i <= 2; i++) {
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, 400);
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(400, i * cellSize);
                ctx.stroke();
            }
            for (let i = 0; i < 9; i++) {
                const row = Math.floor(i / 3);
                const col = i % 3;
                const x = col * cellSize + offset;
                const y = row * cellSize + offset;
                if (board[i] === 'X') {
                    ctx.beginPath();
                    ctx.moveTo(x - 40, y - 40);
                    ctx.lineTo(x + 40, y + 40);
                    ctx.moveTo(x + 40, y - 40);
                    ctx.lineTo(x - 40, y + 40);
                    ctx.lineWidth = 8;
                    ctx.strokeStyle = '#f4c542';
                    ctx.stroke();
                } else if (board[i] === 'O') {
                    ctx.beginPath();
                    ctx.arc(x, y, 38, 0, 2 * Math.PI);
                    ctx.lineWidth = 7;
                    ctx.strokeStyle = '#6bc9ff';
                    ctx.stroke();
                }
            }
            if (winningLine && !gameActive) {
                ctx.save();
                ctx.lineWidth = 12;
                ctx.strokeStyle = '#ffaa44';
                for (let i = 0; i < winningLine.length; i += 3) {
                    const line = winningLine.slice(i, i + 3);
                    if (line.length === 3) {
                        const startIdx = line[0];
                        const endIdx = line[2];
                        const x1 = (startIdx % 3) * cellSize + offset;
                        const y1 = Math.floor(startIdx / 3) * cellSize + offset;
                        const x2 = (endIdx % 3) * cellSize + offset;
                        const y2 = Math.floor(endIdx / 3) * cellSize + offset;
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.stroke();
                    }
                }
                ctx.restore();
            }
        }
        
        function handleCanvasClick(e) {
            if (!gameActive || !isPlayerTurn) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            if (canvasX < 0 || canvasX > 400 || canvasY < 0 || canvasY > 400) return;
            const row = Math.floor(canvasY / cellSize);
            const col = Math.floor(canvasX / cellSize);
            const index = row * 3 + col;
            if (board[index] === '' && gameActive && isPlayerTurn) {
                makeMove(index, 'X');
            }
        }
        
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleCanvasClick(e);
        });
        
        document.getElementById('resetGameBtn').addEventListener('click', resetGame);
        
        diffButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                difficulty = btn.dataset.diff;
                diffButtons.forEach(b => b.classList.toggle('active', b.dataset.diff === difficulty));
                resetGame();
            });
        });
        
        resetGame();
        updateUIStats();
    })();
</script>
</body>
</html>
